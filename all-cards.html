<body class="bg-[#f8fafcFF] min-h-screen font">
  <!-- navbar -->
  <section class="bg-white">
    <div class="navbar flex justify-between shadow-sm px-20">
      <div class="logo flex flex-row items-center gap-1 ">
        <img src="./assets/github-logo.png" class="w-9" alt="">
        <h2 class="text-[#1f2937] leading-[1.2] text-2xl font-semibold">GitHub Issues Tracker</h2>
      </div>
      <!-- search -->
      <div class="search flex items-center gap-3">
        <div class="relative flex items-center">
          <i class="fa-solid fa-magnifying-glass absolute left-4 text-[#64748b] text-lg"></i>
          <input id="search-input" type="text" placeholder="Search issues..."
            class="border border-[#e4e4e7] rounded-lg w-[450px] py-3 pl-12 pr-4 text-[#64748b]">
        </div>

        <button class="cursor-pointer bg-[#4a00ff] text-white px-4 py-3 rounded-lg flex items-center font-semibold text-[16px]">
          <span class="mr-1 text-xl ">+</span> New Issue
        </button>
      </div>
    </div>
  </section>

  <!-- left right padding -->
  <section class="max-w-[1110px] mx-auto bg-[#fbfbfb]">

    <!-- status button -->
    <section class="card  bg-white mt-[60px] flex flex-row space-x-2 p-6">
      <button onclick="switchTab('all')" id="all-btn"
        class="cursor-pointer w-[120px] rounded-sm text-white py-2 px-3 bg-[#4a00ff]">All</button>
      <button onclick="switchTab('open')" id="open-btn"
        class="cursor-pointer w-[120px] rounded-sm py-2 px-3 border border-[#e4e4e7]">Open</button>
      <button onclick="switchTab('closed')" id="closed-btn"
        class="cursor-pointer w-[120px] rounded-sm py-2 px-3 border border-[#e4e4e7]">Closed</button>
    </section>


    <section id="issues-container"
      class=" bg-white flex flex-row justify-between p-6 mt-4 rounded-t-2xl rounded-tr-2xl shadow-sm ">

      <!-- All status -->
      <div class="flex gap-2">
        <img class="w-[50px]" src="./assets/Aperture.png" alt="">
        <div class="issues flex flex-col justify-center">
          <p class="text-[20px] font-semibold text-[#1f2937]"><span id="count"></span> Issues</p>
          <p class="text-[16px] leading-[1.2] font-normal text-[#64748b]">Track and manage your project issues</p>
        </div>
      </div>

      <!-- issues -->
      <div class="flex gap-2 items-center">
        <div class="flex items-center gap-1">
          <span class="w-3 h-3 rounded-full bg-[#10B981]"></span>Open
        </div>
        <span class="w-3 h-3 rounded-full bg-[#a855f7]"></span>Closed
      </div>
      <!-- </div> -->

    </section>

  </section>
  <!-- spinner -->
  <div id="spinner" class="hidden flex justify-center mt-10">
    <span class="loading loading-spinner text-green-500"></span>
  </div>
  <!-- card -->
  <section id="card-container"
    class="max-w-[1110px] mx-auto mt-4 grid grid-cols-1 md:grid-cols-3 shadow-lg mb-5 bg-[#fbfbfb] gap-6 p-6">

<dialog id="my_modal_1" class="modal">
  <div class="modal-box">
    <div id="modal-info"></div>
